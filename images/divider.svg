<svg xmlns="http://www.w3.org/2000/svg" width="900" height="2" viewBox="0 0 900 2">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#22d3ee;stop-opacity:1">
        <animate attributeName="stop-color" values="#22d3ee;#a855f7;#ec4899;#22d3ee" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1">
        <animate attributeName="stop-color" values="#a855f7;#ec4899;#22d3ee;#a855f7" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="85%" style="stop-color:#ec4899;stop-opacity:1">
        <animate attributeName="stop-color" values="#ec4899;#22d3ee;#a855f7;#ec4899" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="2" fill="url(#divGrad)" rx="1"/>
</svg>
