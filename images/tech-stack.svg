<svg xmlns="http://www.w3.org/2000/svg" width="900" height="130" viewBox="0 0 900 130">
  <defs>
    <!-- Styles with imported fonts and animations -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap');
      
      .stack-header {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 9px;
        letter-spacing: 0.25em;
        fill: #64748b;
      }
      
      .tech-name {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 10px;
      }

      .stack-bg {
        fill: #040612;
        fill-opacity: 0.9;
        stroke: rgba(34, 211, 238, 0.1);
        stroke-width: 1.2;
      }
      
      .pill-bg {
        fill: #090e1a;
        fill-opacity: 0.95;
        stroke: rgba(255, 255, 255, 0.05);
        stroke-width: 0.8;
      }

      /* Pulse animation for category lights */
      @keyframes pulseLight {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .indicator-light {
        animation: pulseLight 3s infinite ease-in-out;
      }
    </style>

    <!-- Glowing Filters -->
    <filter id="glowEffect" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main glassmorphic background container -->
  <rect width="900" height="130" rx="14" class="stack-bg"/>

  <!-- Decorative network lines inside container -->
  <line x1="105" y1="0" x2="105" y2="130" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="48" x2="900" y2="48" stroke="rgba(255,255,255,0.03)" stroke-width="0.8"/>
  <line x1="0" y1="90" x2="900" y2="90" stroke="rgba(255,255,255,0.03)" stroke-width="0.8"/>

  <!-- ================= ROW 1: FRONTEND ================= -->
  <!-- Category Tag -->
  <g transform="translate(20, 28)">
    <circle cx="0" cy="-3" r="2.5" fill="#22d3ee" class="indicator-light" filter="url(#glowEffect)"/>
    <text x="12" y="0" class="stack-header">FRONTEND</text>
  </g>

  <!-- HTML5 -->
  <g transform="translate(120, 14)">
    <rect width="80" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#f97316" filter="url(#glowEffect)"/>
    <text x="42" y="16" text-anchor="middle" class="tech-name" fill="#f97316">HTML5</text>
  </g>

  <!-- Tailwind CSS -->
  <g transform="translate(210, 14)">
    <rect width="100" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#38bdf8" filter="url(#glowEffect)"/>
    <text x="52" y="16" text-anchor="middle" class="tech-name" fill="#38bdf8">Tailwind CSS</text>
  </g>

  <!-- CSS 1700+ -->
  <g transform="translate(320, 14)">
    <rect width="90" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#a78bfa" filter="url(#glowEffect)"/>
    <text x="47" y="16" text-anchor="middle" class="tech-name" fill="#a78bfa">CSS 1700+</text>
  </g>

  <!-- ES6+ JS -->
  <g transform="translate(420, 14)">
    <rect width="85" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#facc15" filter="url(#glowEffect)"/>
    <text x="44" y="16" text-anchor="middle" class="tech-name" fill="#facc15">ES6+ JS</text>
  </g>

  <!-- Lenis -->
  <g transform="translate(515, 14)">
    <rect width="70" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#22d3ee" filter="url(#glowEffect)"/>
    <text x="36" y="16" text-anchor="middle" class="tech-name" fill="#22d3ee">Lenis</text>
  </g>

  <!-- AOS -->
  <g transform="translate(595, 14)">
    <rect width="60" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#34d399" filter="url(#glowEffect)"/>
    <text x="31" y="16" text-anchor="middle" class="tech-name" fill="#34d399">AOS</text>
  </g>


  <!-- ================= ROW 2: BACKEND ================= -->
  <!-- Category Tag -->
  <g transform="translate(20, 70)">
    <circle cx="0" cy="-3" r="2.5" fill="#a855f7" class="indicator-light" filter="url(#glowEffect)" style="animation-delay: 1s;"/>
    <text x="12" y="0" class="stack-header">BACKEND</text>
  </g>

  <!-- Python 3 -->
  <g transform="translate(120, 56)">
    <rect width="80" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#3b82f6" filter="url(#glowEffect)"/>
    <text x="42" y="16" text-anchor="middle" class="tech-name" fill="#3b82f6">Python 3</text>
  </g>

  <!-- FastAPI -->
  <g transform="translate(210, 56)">
    <rect width="80" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#059669" filter="url(#glowEffect)"/>
    <text x="42" y="16" text-anchor="middle" class="tech-name" fill="#059669">FastAPI</text>
  </g>

  <!-- SQLAlchemy -->
  <g transform="translate(300, 56)">
    <rect width="95" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#f43f5e" filter="url(#glowEffect)"/>
    <text x="49" y="16" text-anchor="middle" class="tech-name" fill="#f43f5e">SQLAlchemy</text>
  </g>

  <!-- Groq AI -->
  <g transform="translate(405, 56)">
    <rect width="80" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#ec4899" filter="url(#glowEffect)"/>
    <text x="42" y="16" text-anchor="middle" class="tech-name" fill="#ec4899">Groq AI</text>
  </g>


  <!-- ================= ROW 3: CLI ================= -->
  <!-- Category Tag -->
  <g transform="translate(20, 112)">
    <circle cx="0" cy="-3" r="2.5" fill="#facc15" class="indicator-light" filter="url(#glowEffect)" style="animation-delay: 2s;"/>
    <text x="12" y="0" class="stack-header">CLI</text>
  </g>

  <!-- Node.js -->
  <g transform="translate(120, 98)">
    <rect width="80" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#84cc16" filter="url(#glowEffect)"/>
    <text x="42" y="16" text-anchor="middle" class="tech-name" fill="#84cc16">Node.js</text>
  </g>

  <!-- NPM -->
  <g transform="translate(210, 98)">
    <rect width="65" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#ef4444" filter="url(#glowEffect)"/>
    <text x="34" y="16" text-anchor="middle" class="tech-name" fill="#ef4444">NPM</text>
  </g>

  <!-- ANSI FX -->
  <g transform="translate(285, 98)">
    <rect width="75" height="24" rx="6" class="pill-bg"/>
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="#a855f7" filter="url(#glowEffect)"/>
    <text x="39" y="16" text-anchor="middle" class="tech-name" fill="#a855f7">ANSI FX</text>
  </g>


  <!-- Floating decorative system status indicators (Far Right) -->
  <g transform="translate(750, 65)">
    <!-- Circuit grid lines -->
    <path d="M 0,-40 L 40,-40 L 60,-20 L 60,20 L 40,40 L 0,40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.2"/>
    <path d="M 10,-20 L 30,-20 L 40,-10 L 40,10 L 30,20 L 10,20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.2"/>

    <!-- Pulse nodes -->
    <circle cx="60" cy="-20" r="1.5" fill="#22d3ee" opacity="0.3"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="20" r="1.5" fill="#ec4899" opacity="0.3"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="-20" r="2" fill="#a855f7" opacity="0.4"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="40" cy="10" r="1" fill="#facc15" opacity="0.4"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="10" cy="-20" r="2.5" fill="#34d399" opacity="0.3"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
