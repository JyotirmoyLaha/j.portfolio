<svg xmlns="http://www.w3.org/2000/svg" width="900" height="130" viewBox="0 0 900 130">
  <defs>
    <linearGradient id="tsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="tsGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="130" fill="url(#tsBg)" rx="12"/>

  <!-- Row 1: Frontend -->
  <text x="20" y="30" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8" letter-spacing="2">FRONTEND</text>

  <g transform="translate(120, 15)" filter="url(#tsGlow)">
    <rect width="80" height="26" rx="6" fill="none" stroke="#f97316" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#f97316">HTML5</text>
  </g>

  <g transform="translate(210, 15)" filter="url(#tsGlow)">
    <rect width="100" height="26" rx="6" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <text x="50" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#38bdf8">Tailwind CSS</text>
  </g>

  <g transform="translate(320, 15)" filter="url(#tsGlow)">
    <rect width="90" height="26" rx="6" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <text x="45" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a78bfa">CSS 1700+</text>
  </g>

  <g transform="translate(420, 15)" filter="url(#tsGlow)">
    <rect width="85" height="26" rx="6" fill="none" stroke="#facc15" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <text x="42" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#facc15">ES6+ JS</text>
  </g>

  <g transform="translate(515, 15)" filter="url(#tsGlow)">
    <rect width="70" height="26" rx="6" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <text x="35" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#22d3ee">Lenis</text>
  </g>

  <g transform="translate(595, 15)" filter="url(#tsGlow)">
    <rect width="60" height="26" rx="6" fill="none" stroke="#34d399" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#34d399">AOS</text>
  </g>

  <!-- Row 2: Backend -->
  <text x="20" y="72" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8" letter-spacing="2">BACKEND</text>

  <g transform="translate(120, 57)" filter="url(#tsGlow)">
    <rect width="80" height="26" rx="6" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#3b82f6">Python 3</text>
  </g>

  <g transform="translate(210, 57)" filter="url(#tsGlow)">
    <rect width="80" height="26" rx="6" fill="none" stroke="#059669" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#059669">FastAPI</text>
  </g>

  <g transform="translate(300, 57)" filter="url(#tsGlow)">
    <rect width="95" height="26" rx="6" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="47" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#f43f5e">SQLAlchemy</text>
  </g>

  <g transform="translate(405, 57)" filter="url(#tsGlow)">
    <rect width="80" height="26" rx="6" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.7s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ec4899">Groq AI</text>
  </g>

  <!-- Row 3: CLI -->
  <text x="20" y="114" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8" letter-spacing="2">CLI</text>

  <g transform="translate(120, 99)" filter="url(#tsGlow)">
    <rect width="80" height="26" rx="6" fill="none" stroke="#84cc16" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#84cc16">Node.js</text>
  </g>

  <g transform="translate(210, 99)" filter="url(#tsGlow)">
    <rect width="65" height="26" rx="6" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <text x="32" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ef4444">NPM</text>
  </g>

  <g transform="translate(285, 99)" filter="url(#tsGlow)">
    <rect width="75" height="26" rx="6" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <text x="37" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a855f7">ANSI FX</text>
  </g>

  <!-- Floating decorative dots -->
  <circle cx="750" cy="30" r="2" fill="#22d3ee" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="65" r="1.5" fill="#a855f7" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="830" cy="100" r="2.5" fill="#ec4899" opacity="0.2"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="770" cy="110" r="1" fill="#facc15" opacity="0.3"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="860" cy="40" r="1.5" fill="#34d399" opacity="0.2"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="4.5s" repeatCount="indefinite"/></circle>
</svg>
