<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="cGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card 1: 3D Parallax -->
  <g transform="translate(15, 15)">
    <rect width="165" height="150" rx="12" fill="url(#cardBg)" stroke="#22d3ee" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Animated 3D cube icon -->
    <g transform="translate(82, 45)" filter="url(#cGlow)">
      <polygon points="-15,-15 15,-15 15,15 -15,15" fill="none" stroke="#22d3ee" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" values="0;15;0;-15;0" dur="6s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="-10,-10 10,-10 10,10 -10,10" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" values="0;-15;0;15;0" dur="6s" repeatCount="indefinite"/>
      </polygon>
      <line x1="-15" y1="-15" x2="-10" y2="-10" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
      <line x1="15" y1="-15" x2="10" y2="-10" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
      <line x1="15" y1="15" x2="10" y2="10" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
      <line x1="-15" y1="15" x2="-10" y2="10" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
    </g>
    <text x="82" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">3D Parallax</text>
    <text x="82" y="100" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">Profile Card</text>
    <text x="82" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#22d3ee" opacity="0.7">perspective: 1200px</text>
    <text x="82" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#22d3ee" opacity="0.5">preserve-3d</text>
  </g>

  <!-- Card 2: Router -->
  <g transform="translate(195, 15)">
    <rect width="165" height="150" rx="12" fill="url(#cardBg)" stroke="#a855f7" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Animated route icon -->
    <g transform="translate(82, 45)" filter="url(#cGlow)">
      <circle cx="-12" cy="0" r="4" fill="none" stroke="#a855f7" stroke-width="1.5">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="-8" r="3" fill="none" stroke="#a855f7" stroke-width="1.5">
        <animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="8" r="3" fill="none" stroke="#a855f7" stroke-width="1.5">
        <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
      </circle>
      <line x1="-8" y1="-2" x2="9" y2="-8" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="3,2">
        <animate attributeName="stroke-dashoffset" values="0;-10" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="-8" y1="2" x2="9" y2="8" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="3,2">
        <animate attributeName="stroke-dashoffset" values="0;-10" dur="1.5s" repeatCount="indefinite"/>
      </line>
    </g>
    <text x="82" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">Hash Router</text>
    <text x="82" y="100" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">Zero Dependencies</text>
    <text x="82" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#a855f7" opacity="0.7">pushState + popstate</text>
    <text x="82" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#a855f7" opacity="0.5">#blog/:id</text>
  </g>

  <!-- Card 3: Heatmap -->
  <g transform="translate(375, 15)">
    <rect width="165" height="150" rx="12" fill="url(#cardBg)" stroke="#34d399" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- Animated heatmap grid icon -->
    <g transform="translate(60, 30)" filter="url(#cGlow)">
      <rect x="0" y="0" width="8" height="8" rx="1" fill="#34d399" opacity="0.2"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/></rect>
      <rect x="10" y="0" width="8" height="8" rx="1" fill="#34d399" opacity="0.5"><animate attributeName="opacity" values="0.5;0.3;0.5" dur="2.5s" repeatCount="indefinite"/></rect>
      <rect x="20" y="0" width="8" height="8" rx="1" fill="#34d399" opacity="0.8"><animate attributeName="opacity" values="0.8;0.4;0.8" dur="3.5s" repeatCount="indefinite"/></rect>
      <rect x="30" y="0" width="8" height="8" rx="1" fill="#34d399" opacity="0.3"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/></rect>
      <rect x="0" y="10" width="8" height="8" rx="1" fill="#34d399" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/></rect>
      <rect x="10" y="10" width="8" height="8" rx="1" fill="#34d399" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/></rect>
      <rect x="20" y="10" width="8" height="8" rx="1" fill="#34d399" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/></rect>
      <rect x="30" y="10" width="8" height="8" rx="1" fill="#34d399" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/></rect>
      <rect x="0" y="20" width="8" height="8" rx="1" fill="#34d399" opacity="0.5"><animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/></rect>
      <rect x="10" y="20" width="8" height="8" rx="1" fill="#34d399" opacity="0.1"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="2s" repeatCount="indefinite"/></rect>
      <rect x="20" y="20" width="8" height="8" rx="1" fill="#34d399" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/></rect>
      <rect x="30" y="20" width="8" height="8" rx="1" fill="#34d399" opacity="0.4"><animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/></rect>
    </g>
    <text x="82" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">GitHub Heatmap</text>
    <text x="82" y="100" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">Live Contributions</text>
    <text x="82" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#34d399" opacity="0.7">async API hydration</text>
    <text x="82" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#34d399" opacity="0.5">dynamic grid cells</text>
  </g>

  <!-- Card 4: AI Chatbot -->
  <g transform="translate(555, 15)">
    <rect width="165" height="150" rx="12" fill="url(#cardBg)" stroke="#ec4899" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Animated brain/AI icon -->
    <g transform="translate(82, 45)" filter="url(#cGlow)">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#ec4899" stroke-width="1.5">
        <animate attributeName="r" values="10;14;10" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="6" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.6">
        <animate attributeName="r" values="6;3;6" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="2" fill="#ec4899" opacity="0.8">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Neural connections -->
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#ec4899" stroke-width="0.5" opacity="0.4">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="6" y1="-6" x2="-6" y2="6" stroke="#ec4899" stroke-width="0.5" opacity="0.4">
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
      </line>
    </g>
    <text x="82" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">AI Assistant</text>
    <text x="82" y="100" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">Context-Aware Bot</text>
    <text x="82" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#ec4899" opacity="0.7">Groq + Llama LLM</text>
    <text x="82" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#ec4899" opacity="0.5">rate-limited API</text>
  </g>

  <!-- Card 5: CLI Card -->
  <g transform="translate(735, 15)">
    <rect width="150" height="150" rx="12" fill="url(#cardBg)" stroke="#facc15" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Animated terminal icon -->
    <g transform="translate(75, 45)" filter="url(#cGlow)">
      <rect x="-16" y="-10" width="32" height="22" rx="3" fill="none" stroke="#facc15" stroke-width="1.5"/>
      <text x="-10" y="2" font-family="'Courier New', monospace" font-size="9" fill="#facc15">
        &gt;_
        <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
      </text>
    </g>
    <text x="75" y="85" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">CLI Card</text>
    <text x="75" y="100" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">NPM Package</text>
    <text x="75" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#facc15" opacity="0.7">npx jyotirmoy-laha</text>
    <text x="75" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#facc15" opacity="0.5">--matrix mode</text>
  </g>
</svg>
